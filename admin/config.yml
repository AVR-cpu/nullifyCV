backend:
  name: github
  repo: AVR-cpu/nullifyCV
  branch: main

# Files are stored in the repo — no separate media server needed
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Allow editorial workflow (draft → review → publish)
publish_mode: editorial_workflow

collections:

  # ── Blog / SEO articles ──────────────────────────────────────────────────
  - name: "blog"
    label: "Blog articles"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Meta description (max 155 chars)", name: "description", widget: "string" }
      - { label: "Publish date", name: "date", widget: "datetime" }
      - { label: "Language", name: "lang", widget: "select", options: ["en", "nl"], default: "en" }
      - { label: "Featured image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # ── Landing page text blocks ─────────────────────────────────────────────
  - name: "pages"
    label: "Page content"
    files:

      - label: "Homepage (index)"
        name: "home"
        file: "_content/home.yml"
        fields:
          - { label: "Hero title", name: "hero_title", widget: "string" }
          - { label: "Hero subtitle", name: "hero_sub", widget: "text" }
          - { label: "Privacy banner text", name: "privacy_banner", widget: "string" }

      - label: "US landing page"
        name: "us"
        file: "_content/us.yml"
        fields:
          - { label: "Hero title", name: "hero_title", widget: "string" }
          - { label: "Hero subtitle", name: "hero_sub", widget: "text" }
          - { label: "Meta description", name: "meta_description", widget: "string" }

      - label: "NL landing page"
        name: "nl"
        file: "_content/nl.yml"
        fields:
          - { label: "Hero title", name: "hero_title", widget: "string" }
          - { label: "Hero subtitle", name: "hero_sub", widget: "text" }
          - { label: "Meta description", name: "meta_description", widget: "string" }
