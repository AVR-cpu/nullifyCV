<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>NullifyCV — Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^2.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main'
        },
        site_url: 'https://nullifycv.netlify.app',
        display_url: 'https://nullifycv.com',
        media_folder: 'nullifycv/images/uploads',
        public_folder: '/images/uploads',
        collections: [{
          name: 'blog',
          label: 'Blog articles',
          folder: 'nullifycv/blog',
          create: true,
          slug: '{{slug}}',
          extension: 'html',
          format: 'frontmatter',
          fields: [
            { label: 'Title', name: 'title', widget: 'string' },
            { label: 'Meta description', name: 'description', widget: 'string' },
            { label: 'Publish date', name: 'date', widget: 'datetime' },
            { label: 'Language', name: 'lang', widget: 'select', options: ['en', 'nl'], default: 'en' },
            { label: 'Body', name: 'body', widget: 'markdown' }
          ]
        }]
      }
    });
  </script>
</body>
</html>
